<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vision Solutions — Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--navy:#05082A;--ink:#14235F;--slate:#5B6478}
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,sans-serif;color:var(--ink);background:#EEF1F6;padding:40px 20px}
  .wrap{max-width:960px;margin:0 auto}
  h1{font-family:"Space Grotesk";font-weight:700;font-size:1.6rem;letter-spacing:-.01em;margin:0 0 4px}
  .sub{color:var(--slate);font-size:.9rem;margin-bottom:28px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{border-radius:18px;padding:34px;display:flex;align-items:center;justify-content:center;min-height:190px;position:relative;border:1px solid rgba(0,0,0,.06)}
  .label{position:absolute;top:14px;left:16px;font-family:"Space Grotesk";font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;font-weight:600;opacity:.55}
  .light{background:#fff}
  .navy{background:var(--navy)}
  .photo{background:linear-gradient(135deg,#123A8C,#1E86C4 55%,#8DC63F)}
  .wordmark{font-family:"Space Grotesk";font-weight:700;letter-spacing:.30em;text-transform:uppercase}
  .row{display:flex;align-items:center;gap:26px;flex-wrap:wrap}
  .swatches{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap}
  .sw{width:120px;border-radius:12px;overflow:hidden;border:1px solid rgba(0,0,0,.06);font-size:.72rem}
  .sw .chip{height:56px}
  .sw .meta{padding:8px 10px;background:#fff}
  .sw .meta b{font-family:"Space Grotesk"}
  .mono{color:var(--slate)}
  .full{grid-column:1/-1}
</style>
</head>
<body>
<div class="wrap">
  <h1>Vision Solutions — Logo</h1>
  <p class="sub">Professional mark: gradient hexagon (teal → lime) with layered brand chevrons.</p>

  <div class="grid">
    <!-- lockup on light -->
    <div class="card light full">
      <span class="label" style="color:#14235F">Primary lockup</span>
      <div class="row">
        <svg width="76" height="76" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="a" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#1E86C4"/><stop offset="1" stop-color="#8DC63F"/></linearGradient></defs>
          <path d="M32 3 57 17.5 57 46.5 32 61 7 46.5 7 17.5Z" stroke="url(#a)" stroke-width="2.4" stroke-linejoin="round"/>
          <path d="M23 21 34.5 32 23 43" stroke="#1E86C4" stroke-width="4.3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M32 21 43.5 32 32 43" stroke="#8DC63F" stroke-width="4.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div style="line-height:1.15">
          <div class="wordmark" style="font-size:1.5rem;color:#14235F">Vision</div>
          <div class="wordmark" style="font-size:.78rem;color:#5B6478;letter-spacing:.34em">Solutions Limited</div>
        </div>
      </div>
    </div>

    <!-- color on light -->
    <div class="card light">
      <span class="label" style="color:#14235F">Color / light</span>
      <svg width="96" height="96" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="b" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#1E86C4"/><stop offset="1" stop-color="#8DC63F"/></linearGradient></defs>
        <path d="M32 3 57 17.5 57 46.5 32 61 7 46.5 7 17.5Z" stroke="url(#b)" stroke-width="2.4" stroke-linejoin="round"/>
        <path d="M23 21 34.5 32 23 43" stroke="#1E86C4" stroke-width="4.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M32 21 43.5 32 32 43" stroke="#8DC63F" stroke-width="4.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- color on navy -->
    <div class="card navy">
      <span class="label" style="color:#fff">Color / navy</span>
      <svg width="96" height="96" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="c" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#1E86C4"/><stop offset="1" stop-color="#8DC63F"/></linearGradient></defs>
        <path d="M32 3 57 17.5 57 46.5 32 61 7 46.5 7 17.5Z" stroke="url(#c)" stroke-width="2.4" stroke-linejoin="round"/>
        <path d="M23 21 34.5 32 23 43" stroke="#1E86C4" stroke-width="4.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M32 21 43.5 32 32 43" stroke="#8DC63F" stroke-width="4.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- white on photo -->
    <div class="card photo">
      <span class="label" style="color:#fff">White / on color</span>
      <svg width="96" height="96" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 3 57 17.5 57 46.5 32 61 7 46.5 7 17.5Z" stroke="#fff" stroke-width="2.4" stroke-linejoin="round"/>
        <path d="M23 21 34.5 32 23 43" stroke="#fff" stroke-width="4.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M32 21 43.5 32 32 43" stroke="#fff" stroke-width="4.3" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
      </svg>
    </div>

    <!-- favicon / small sizes -->
    <div class="card light">
      <span class="label" style="color:#14235F">Favicon / small sizes</span>
      <div class="row" style="gap:20px">
        <svg width="48" height="48" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="f1" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#1E86C4"/><stop offset="1" stop-color="#8DC63F"/></linearGradient></defs>
          <path d="M32 2 58 17 58 47 32 62 6 47 6 17Z" fill="url(#f1)"/>
          <path d="M22 22 33 32 22 42" fill="none" stroke="#fff" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M31 22 42 32 31 42" fill="none" stroke="#fff" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round" opacity=".72"/>
        </svg>
        <svg width="28" height="28" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="f2" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#1E86C4"/><stop offset="1" stop-color="#8DC63F"/></linearGradient></defs>
          <path d="M32 2 58 17 58 47 32 62 6 47 6 17Z" fill="url(#f2)"/>
          <path d="M22 22 33 32 22 42" fill="none" stroke="#fff" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M31 22 42 32 31 42" fill="none" stroke="#fff" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round" opacity=".72"/>
        </svg>
        <svg width="18" height="18" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="f3" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#1E86C4"/><stop offset="1" stop-color="#8DC63F"/></linearGradient></defs>
          <path d="M32 2 58 17 58 47 32 62 6 47 6 17Z" fill="url(#f3)"/>
          <path d="M22 22 33 32 22 42" fill="none" stroke="#fff" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M31 22 42 32 31 42" fill="none" stroke="#fff" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round" opacity=".72"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#05082A"></div><div class="meta"><b>Navy</b><br><span class="mono">#05082A</span></div></div>
    <div class="sw"><div class="chip" style="background:#123A8C"></div><div class="meta"><b>Royal</b><br><span class="mono">#123A8C</span></div></div>
    <div class="sw"><div class="chip" style="background:#1E86C4"></div><div class="meta"><b>Teal</b><br><span class="mono">#1E86C4</span></div></div>
    <div class="sw"><div class="chip" style="background:#8DC63F"></div><div class="meta"><b>Lime</b><br><span class="mono">#8DC63F</span></div></div>
  </div>
</div>
</body>
</html>
